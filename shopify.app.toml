
# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "661999a5eb0e01499c6403ae4fa5931a"
name = "return-shield"
application_url = "https://return-shield.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_customers,read_orders,read_products,read_returns,read_shipping,write_orders,write_returns"

[app_proxy]
url = "/portal"
prefix = "apps"
subpath = "returns"

[auth]
redirect_urls = [
  "https://return-shield.fly.dev/auth/callback",
  "https://return-shield.fly.dev/auth/shopify/callback",
  "https://return-shield.fly.dev/api/auth/callback"
]
