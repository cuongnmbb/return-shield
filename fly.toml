# fly.toml app configuration file generated for return-shield on 2026-03-06T08:40:40+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'return-shield'
primary_region = 'syd'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_customers,read_orders,read_products,read_returns,read_shipping,write_orders,write_returns'
  SHOPIFY_API_KEY = '661999a5eb0e01499c6403ae4fa5931a'
  SHOPIFY_APP_URL = 'https://return-shield.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'sqlite_data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
